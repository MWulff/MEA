<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Reward</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a0a2e;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
    }

    #wheel-wrapper {
      position: relative;
      display: inline-block; /* sized to canvas */
    }

    #pointer {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 20px solid #ff0080;
      z-index: 1;
    }

    #wheel-canvas {
      display: block;
    }

    #reward-claimed {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #aaaacc;
      font-size: 14px;
    }

    #reward-claimed img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    #spin-btn {
      width: 100%;
      max-width: 320px;
      height: 52px;
      border: none;
      border-radius: 12px;
      background: #ff0080;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    #spin-btn:disabled {
      background: #444466;
      color: #aaaacc;
      cursor: default;
    }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #modal-overlay.visible {
      display: flex;
    }

    #modal-card {
      background: #2d1b4e;
      border-radius: 16px;
      padding: 24px;
      width: min(320px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    #modal-icon {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    #modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
    }

    #modal-desc {
      font-size: 14px;
      color: #aaaacc;
    }

    #modal-claim-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 12px;
      background: #ff0080;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    #dev-reset {
      position: fixed;
      bottom: 12px;
      right: 12px;
      font-size: 11px;
      color: #aaaacc;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
    }
  </style>
</head>
<body>

  <h1>Daily Reward</h1>

  <div id="wheel-wrapper">
    <div id="pointer"></div>
    <canvas id="wheel-canvas"></canvas>
  </div>

  <div id="reward-claimed">
    <img id="claimed-icon" alt="">
    <span id="claimed-label"></span>
  </div>

  <button id="spin-btn">TAP TO SPIN</button>

  <!-- Result modal -->
  <div id="modal-overlay">
    <div id="modal-card">
      <img id="modal-icon" alt="">
      <div id="modal-title"></div>
      <div id="modal-desc"></div>
      <button id="modal-claim-btn">CLAIM REWARD</button>
    </div>
  </div>

  <button id="dev-reset">Reset (dev)</button>

  <script>
    // ── Reward data ──────────────────────────────────────────────
    const REWARDS = [
      { id: '2x_news',   label: '2× points – next 3 News',    desc: 'Your next 3 news articles earn double points',             asset: 'Assets/graphic/news.png' },
      { id: '2x_video',  label: '2× points – next 3 Videos',  desc: 'Your next 3 rewarded videos earn double points',           asset: 'Assets/graphic/video.png' },
      { id: '2x_music',  label: '2× points – next 3 Songs',   desc: 'Your next 3 songs earn double points',                     asset: 'Assets/graphic/music.png' },
      { id: '100_points',label: '+100 points',                 desc: '100 bonus points added to your balance',                   asset: 'Assets/graphic/points.png' },
      { id: '2x_vip',    label: '2× points – next action',    desc: 'Your next eligible earning action earns double points',    asset: 'Assets/graphic/pointsvip.png' },
    ];

    const STORAGE_KEY = 'mea_daily_reward';

    function todayStr() {
      return new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (data.date !== todayStr()) {
          localStorage.removeItem(STORAGE_KEY);
          return null;
        }
        return data; // { date, rewardId, status: 'spun'|'used' }
      } catch {
        localStorage.removeItem(STORAGE_KEY);
        return null;
      }
    }

    function saveState(rewardId, status) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        date: todayStr(),
        rewardId,
        status,
      }));
    }

    function getReward(id) {
      return REWARDS.find(r => r.id === id) || null;
    }
  </script>

</body>
</html>
