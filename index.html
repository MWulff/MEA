<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Reward</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1a0a2e;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
    }

    #wheel-wrapper {
      position: relative;
      display: inline-block; /* sized to canvas */
    }

    #pointer {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 20px solid #ff0080;
      z-index: 1;
    }

    #wheel-canvas {
      display: block;
    }

    #reward-claimed {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #aaaacc;
      font-size: 14px;
    }

    #reward-claimed img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    #spin-btn {
      width: 100%;
      max-width: 320px;
      height: 52px;
      border: none;
      border-radius: 12px;
      background: #ff0080;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    #spin-btn:disabled {
      background: #444466;
      color: #aaaacc;
      cursor: default;
    }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      transition: opacity 200ms ease;
    }

    #modal-overlay.visible {
      display: flex;
      opacity: 1;
    }

    #modal-card {
      background: #2d1b4e;
      border-radius: 16px;
      padding: 24px;
      width: min(320px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    #modal-icon {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }

    #modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
    }

    #modal-desc {
      font-size: 14px;
      color: #aaaacc;
    }

    #modal-claim-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 12px;
      background: #ff0080;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }

    #dev-reset {
      position: fixed;
      bottom: 12px;
      right: 12px;
      font-size: 11px;
      color: #aaaacc;
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
    }
  </style>
</head>
<body>

  <h1>Daily Reward</h1>

  <div id="wheel-wrapper">
    <div id="pointer"></div>
    <canvas id="wheel-canvas"></canvas>
  </div>

  <div id="reward-claimed">
    <img id="claimed-icon" alt="">
    <span id="claimed-label"></span>
  </div>

  <button id="spin-btn">TAP TO SPIN</button>

  <!-- Result modal -->
  <div id="modal-overlay">
    <div id="modal-card">
      <img id="modal-icon" alt="">
      <div id="modal-title"></div>
      <div id="modal-desc"></div>
      <button id="modal-claim-btn">CLAIM REWARD</button>
    </div>
  </div>

  <button id="dev-reset">Reset (dev)</button>

  <script>
    // ── Reward data ──────────────────────────────────────────────
    const REWARDS = [
      { id: '2x_news',   label: '2× points – next 3 News',    desc: 'Your next 3 news articles earn double points',             asset: 'Assets/graphic/news.png' },
      { id: '2x_video',  label: '2× points – next 3 Videos',  desc: 'Your next 3 rewarded videos earn double points',           asset: 'Assets/graphic/video.png' },
      { id: '2x_music',  label: '2× points – next 3 Songs',   desc: 'Your next 3 songs earn double points',                     asset: 'Assets/graphic/music.png' },
      { id: '100_points',label: '+100 points',                 desc: '100 bonus points added to your balance',                   asset: 'Assets/graphic/points.png' },
      { id: '2x_vip',    label: '2× points – next action',    desc: 'Your next eligible earning action earns double points',    asset: 'Assets/graphic/pointsvip.png' },
    ];

    const STORAGE_KEY = 'mea_daily_reward';

    function todayStr() {
      return new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const data = JSON.parse(raw);
        if (data.date !== todayStr()) {
          localStorage.removeItem(STORAGE_KEY);
          return null;
        }
        return data; // { date, rewardId, status: 'spun'|'used' }
      } catch {
        localStorage.removeItem(STORAGE_KEY);
        return null;
      }
    }

    function saveState(rewardId, status) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        date: todayStr(),
        rewardId,
        status,
      }));
    }

    function getReward(id) {
      return REWARDS.find(r => r.id === id) || null;
    }

    // ── Canvas setup ─────────────────────────────────────────────
    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');

    const SEG_COLOURS = ['#3d1f6e', '#2d1b4e', '#3d1f6e', '#2d1b4e', '#3d1f6e']; // even/odd alternation
    const SEG_COUNT = REWARDS.length; // 5
    const SEG_ANGLE = (2 * Math.PI) / SEG_COUNT; // 72° in radians

    let wheelRotation = 0; // cumulative degrees, never reset except on page reload

    // Preload reward images
    const rewardImages = REWARDS.map(r => {
      const img = new Image();
      img.src = r.asset;
      return img;
    });

    function setCanvasSize() {
      const size = Math.min(window.innerWidth * 0.8, 320);
      canvas.width = size;
      canvas.height = size;
    }

    function drawWheel(rotationDeg) {
      const size = canvas.width;
      const cx = size / 2;
      const cy = size / 2;
      const radius = size / 2 - 4; // small inset so edge isn't clipped
      const rotRad = (rotationDeg * Math.PI) / 180;

      ctx.clearRect(0, 0, size, size);

      for (let i = 0; i < SEG_COUNT; i++) {
        const startAngle = rotRad + i * SEG_ANGLE - Math.PI / 2;
        const endAngle = startAngle + SEG_ANGLE;
        const midAngle = startAngle + SEG_ANGLE / 2;

        // Segment fill
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = SEG_COLOURS[i];
        ctx.fill();

        // Segment border
        ctx.strokeStyle = '#1a0a2e';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Icon
        const iconDist = radius * 0.6;
        const iconX = cx + Math.cos(midAngle) * iconDist;
        const iconY = cy + Math.sin(midAngle) * iconDist;
        const iconSize = 36;
        const img = rewardImages[i];
        if (img.complete && img.naturalWidth > 0) {
          ctx.drawImage(img, iconX - iconSize / 2, iconY - iconSize / 2, iconSize, iconSize);
        }

        // Label
        ctx.save();
        ctx.translate(iconX + Math.cos(midAngle) * radius * 0.22, iconY + Math.sin(midAngle) * radius * 0.22);
        // Flip text so it always reads outward (never upside-down)
        const normalizedMid = ((midAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
        const flip = normalizedMid > Math.PI / 2 && normalizedMid < 3 * Math.PI / 2 ? Math.PI : 0;
        ctx.rotate(midAngle + Math.PI / 2 + flip);
        ctx.fillStyle = '#ffffff';
        ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'alphabetic';
        ctx.fillText(REWARDS[i].label, 0, 0);
        ctx.restore();
      }

      // Outer ring
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
      ctx.strokeStyle = '#ff0080';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // ── Initial render ────────────────────────────────────────────
    setCanvasSize();
    drawWheel(wheelRotation);

    // ── Animation ────────────────────────────────────────────────
    function easeOut(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function spinTo(segmentIndex, onStop) {
      const DURATION = 3000;
      const startTime = performance.now();
      const startRotation = wheelRotation;

      const segmentCentreAngle = (segmentIndex * 72) + 36; // degrees, clockwise from top
      const currentRotation = wheelRotation % 360;
      const offset = (360 - currentRotation - segmentCentreAngle + 360) % 360;
      const totalRotation = wheelRotation + 1800 + offset;

      function frame(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / DURATION, 1);
        const progress = easeOut(t);
        const currentAngle = startRotation + (totalRotation - startRotation) * progress;

        drawWheel(currentAngle);

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          wheelRotation = totalRotation;
          drawWheel(wheelRotation);
          onStop();
        }
      }

      requestAnimationFrame(frame);
    }

    // ── State ────────────────────────────────────────────────────
    const STATE = { READY: 'ready', SPINNING: 'spinning', CLAIMED: 'claimed', USED: 'used' };
    let appState = STATE.READY;

    const spinBtn       = document.getElementById('spin-btn');
    const rewardClaimed = document.getElementById('reward-claimed');
    const claimedIcon   = document.getElementById('claimed-icon');
    const claimedLabel  = document.getElementById('claimed-label');
    const modalOverlay  = document.getElementById('modal-overlay');
    const modalIcon     = document.getElementById('modal-icon');
    const modalTitle    = document.getElementById('modal-title');
    const modalDesc     = document.getElementById('modal-desc');
    const modalClaimBtn = document.getElementById('modal-claim-btn');
    const devReset      = document.getElementById('dev-reset');

    function render(state, reward) {
      appState = state;

      // Spin button
      if (state === STATE.READY) {
        spinBtn.textContent = 'TAP TO SPIN';
        spinBtn.disabled = false;
      } else if (state === STATE.SPINNING) {
        spinBtn.textContent = 'TAP TO SPIN';
        spinBtn.disabled = true;
      } else {
        spinBtn.textContent = 'Come back tomorrow';
        spinBtn.disabled = true;
      }

      // Claimed reward strip (USED only — not shown during CLAIMED/modal state)
      if (state === STATE.USED && reward) {
        rewardClaimed.style.display = 'flex';
        claimedIcon.src = reward.asset;
        claimedIcon.alt = reward.label;
        claimedLabel.textContent = reward.label;
      } else {
        rewardClaimed.style.display = 'none';
      }

      // Dev reset visibility
      devReset.style.display = state === STATE.SPINNING ? 'none' : '';

      // Resize handler (no-op during SPINNING)
      window._spinningState = state === STATE.SPINNING;
    }

    window.addEventListener('resize', () => {
      if (window._spinningState) return;
      setCanvasSize();
      drawWheel(wheelRotation);
    });

    // ── Modal ────────────────────────────────────────────────────
    function showModal(reward) {
      modalIcon.src = reward.asset;
      modalIcon.alt = reward.label;
      modalTitle.textContent = reward.label;
      modalDesc.textContent = reward.desc;

      modalOverlay.style.opacity = '0';
      modalOverlay.style.transition = 'none';
      modalOverlay.classList.add('visible');

      // Force reflow before transition
      modalOverlay.getBoundingClientRect();
      modalOverlay.style.transition = 'opacity 200ms ease';
      modalOverlay.style.opacity = '1';
    }

    function hideModal(onDone) {
      modalOverlay.style.transition = 'opacity 200ms ease';
      modalOverlay.style.opacity = '0';
      setTimeout(() => {
        modalOverlay.remove();
        onDone();
      }, 200);
    }

    // ── Event handlers ───────────────────────────────────────────
    spinBtn.addEventListener('click', () => {
      if (appState !== STATE.READY) return;

      // Pre-determine reward
      const segmentIndex = Math.floor(Math.random() * REWARDS.length);
      const reward = REWARDS[segmentIndex];

      // Persist immediately (before animation)
      saveState(reward.id, 'spun');
      render(STATE.SPINNING, null);

      spinTo(segmentIndex, () => {
        // Wheel stopped — transition to CLAIMED (in-memory only)
        render(STATE.CLAIMED, reward);
        setTimeout(() => showModal(reward), 300);
      });
    });

    modalClaimBtn.addEventListener('click', () => {
      const stored = loadState();
      if (!stored) return;

      // Render USED underneath (visible through fading overlay)
      const reward = getReward(stored.rewardId);
      render(STATE.USED, reward);

      // Update localStorage
      saveState(stored.rewardId, 'used');

      // Fade out and remove modal
      hideModal(() => {});
    });

    devReset.addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    });
  </script>

</body>
</html>
